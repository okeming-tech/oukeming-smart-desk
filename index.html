  .hero-slogan {

  .hero-buttons { display: flex; gap: 1rem; flex-wrap: wrap; }
  .btn-primary {

  .animate-delay-1 { animation-delay: 0.1s; opacity: 0; }
  .animate-delay-2 { animation-delay: 0.2s; opacity: 0; }

    .nav-links .dropdown.open .dropdown-menu { display: block; }
    .nav-toggle { display: block; }
    .footer-inner { grid-template-columns: 1fr; gap: 1.5rem; }
    .section { padding: 3rem 1.25rem; }
    .hero { padding: 5rem 1.25rem 2rem; }
    .hero h1 { font-size: 1.8rem; }
    .hero-visual img { max-width: 320px; }
    .product-series-list { gap: 1.5rem; }
    .service-grid { grid-template-columns: repeat(2, 1fr); }
    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
  }

  @media (max-width: 480px) {

    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .service-grid { grid-template-columns: 1fr; }
    .cta-card { padding: 2rem 1.25rem; }
  }
</style>
</head>

<script>
  // Navigation scroll effect
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 50);

  // Mobile nav toggle
  const navToggle = document.getElementById('navToggle');
  const navLinks = document.getElementById('navLinks');
  navToggle.addEventListener('click', () => {
    navLinks.classList.toggle('open');
  });

  // Mobile dropdown toggle
  document.querySelectorAll('.nav-links .dropdown > a').forEach(dropLink => {
    dropLink.addEventListener('click', function(e) {
      if (window.innerWidth <= 768) {
        e.preventDefault();
        this.parentElement.classList.toggle('open');
      }
    });
  });

  // Close mobile nav on link click
  navLinks.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      if (window.innerWidth <= 768) {
        navLinks.classList.remove('open');
      }
    });
  });

  // Smooth scroll
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function(e) {
      const href = this.getAttribute('href');
      if (href === '#') return;
      e.preventDefault();
      const target = document.querySelector(href);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });

  // Intersection Observer for scroll animations
  const observerOptions = { threshold: 0.15, rootMargin: '0px 0px -40px 0px' };
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.style.animationPlayState = 'running';
        observer.unobserve(entry.target);
      }
    });
  }, observerOptions);

  document.querySelectorAll('.animate, .animate-delay-1, .animate-delay-2, .animate-delay-3')
    .forEach(el => { el.style.animationPlayState = 'paused'; observer.observe(el); });
</script>
