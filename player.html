<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>B站视频播放</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
#player { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
#fullscreen-btn {
  position: absolute; bottom: 20px; right: 20px; z-index: 10;
  width: 48px; height: 48px; border-radius: 50%;
  background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.6);
  color: #fff; font-size: 24px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
#overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 20; display: flex; align-items: center; justify-content: center;
}
#overlay button {
  padding: 16px 48px; font-size: 20px; border: none; border-radius: 8px;
  background: #fb7299; color: #fff; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
</style>
</head>
<body>
<iframe
  id="player"
  src="https://player.bilibili.com/player.html?bvid=BV1KQVR6PEu6&autoplay=0&danmaku=0"
  frameborder="0"
  allow="autoplay; fullscreen"
  allowfullscreen>
</iframe>
<button id="fullscreen-btn" onclick="goFullscreen()" title="全屏">⛶</button>
<div id="overlay">
  <button onclick="startPlay()">点击播放</button>
</div>
<script>
function startPlay() {
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('player').src =
    'https://player.bilibili.com/player.html?bvid=BV1KQVR6PEu6&autoplay=1&danmaku=0';
}
function goFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if (el.msRequestFullscreen) el.msRequestFullscreen();
}
</script>
</body>
</html>
