<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="referrer" content="origin">
<title>欧科明-智慧书桌使用讲解</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
.container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; }
#player { width: 100%; max-width: 450px; height: 100%; border: none; }
#fullscreen-btn {
  position: absolute; bottom: 24px; right: 24px; z-index: 10;
  width: 52px; height: 52px; border-radius: 50%;
  background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.5);
  color: #fff; font-size: 26px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
#overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 20; display: flex; align-items: center; justify-content: center;
  background: #000; transition: opacity 0.3s;
}
#overlay.hidden { opacity: 0; pointer-events: none; }
#cover-img {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  object-fit: cover;
}
#cover-mask {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.3);
}
#play-btn {
  position: relative; z-index: 1;
  padding: 18px 56px; font-size: 22px; border: 2px solid #fff; border-radius: 10px;
  background: rgba(251,114,153,0.85); color: #fff; cursor: pointer; font-weight: bold;
  -webkit-tap-highlight-color: transparent;
}
</style>
</head>
<body>
<div class="container">
<iframe id="player"
  src="https://player.bilibili.com/player.html?bvid=BV148Kd6QEec&autoplay=0&danmaku=0&high_quality=1&as_wide=1"
  allow="autoplay; fullscreen" allowfullscreen>
</iframe>
</div>
<button id="fullscreen-btn" onclick="goFullscreen()" title="全屏">&#x26F6;</button>
<div id="overlay">
  <img id="cover-img" src="cover_BV148Kd6QEec.jpg" alt="">
  <div id="cover-mask"></div>
  <button id="play-btn" onclick="startPlay()">▶ 点击播放</button>
</div>
<script>
function startPlay() {
  var p = document.getElementById('player').contentWindow;
  document.getElementById('overlay').classList.add('hidden');
  p.postMessage({"type": "player", "action": "play"}, '*');
  setTimeout(function() { p.postMessage({"type": "quality", "value": 80}, '*'); }, 1000);
}
function goFullscreen() {
  var el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if (el.msRequestFullscreen) el.msRequestFullscreen();
}
</script>
</body>
</html>
